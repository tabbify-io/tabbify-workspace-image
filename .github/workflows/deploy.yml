name: Deploy Workspace Image to Tabbify
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # `tcli deploy --remote` is git-aware: it sends this repo's git_ref and the
      # SUPERVISOR clones the repo + runs `docker build` itself. The Dockerfile is
      # now SELF-CONTAINED (a multi-stage `binbuilder` stage builds
      # tabbify-codeservice + tabbify-broker from source at docker-build time), so
      # the CI builds NOTHING here — no rust/zig/cargo-zigbuild/build-binaries.
      # Just checkout → deploy. (deploy@v1 defaults remote: true.)
      - name: Deploy (remote build on Tabbify infra)
        uses: tabbify-io/deploy@v1
        with:
          token: ${{ secrets.TABBIFY_DEPLOY_TOKEN }}
          remote: true
