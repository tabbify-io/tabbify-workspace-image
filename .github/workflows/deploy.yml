name: Deploy Workspace Image to Tabbify
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # `tcli deploy --remote` is git-aware: it sends this repo's git_ref and the
      # SUPERVISOR clones the repo + runs `docker build` itself on the prod box.
      # The Dockerfile no longer COMPILES the in-FC binaries (the old multi-stage
      # `binbuilder` Rust build blew the deploy timeout) — it `curl`s pre-built
      # tabbify-codeservice + tabbify-broker from this repo's PUBLIC rev-pinned
      # GitHub releases (built once via scripts/build-binaries.sh + uploaded with
      # `gh release create bin-<crate>-<short>`). So the CI builds NOTHING here —
      # the releases are the source of truth. Just checkout → deploy.
      # (deploy@v1 defaults remote: true.)
      - name: Deploy (remote build on Tabbify infra)
        uses: tabbify-io/deploy@v1
        with:
          token: ${{ secrets.TABBIFY_DEPLOY_TOKEN }}
          remote: true
