# Tabbify Workspace kernel hardening (spec §4). Applied by /init via `sysctl -w`
# at boot (this file documents the intended values; the FC rootfs has no
# systemd-sysctl to read it automatically). The agent uid is confined; these
# knobs make the confinement defence-in-depth:
#
#   kernel.yama.ptrace_scope=2 — only a process with CAP_SYS_PTRACE may ptrace;
#     the agent uid cannot attach to / read the memory of the broker process.
#
# /proc hidepid=2 is applied as a mount option in /init (not a sysctl), hiding
# other uids' /proc entries (broker PID, cmdline, environ) from the agent.
kernel.yama.ptrace_scope = 2
